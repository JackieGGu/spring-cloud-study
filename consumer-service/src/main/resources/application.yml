server:
  port: 10011
  servlet:
    context-path: /consumer

spring:
  application:
    name: consumer-service

logging:
  level:
    root: debug

eureka:
  instance:
    # Eureka界面显示的应用名称
    appname: ${spring.application.name}
    # Eureka界面显示的应用信息
    instance-id: ${spring.cloud.client.ip-address}:${server.port}:[@project.version@]
    # 使用IP地址注册
    prefer-ip-address: true
    # 心跳周期
    # lease-renewal-interval-in-seconds: 30
    # 在未收到心跳时最大续约时长, 若注册中心检测超过该时长将移除该实例
    # lease-expiration-duration-in-seconds: 90
  client:
    service-url:
      # 注册中心的地址
      defaultZone: http://eureka-node1:10001/eureka/,http://eureka-node2:10002/eureka/

# Ribbon负载均衡配置(服务名称 + ribbon + NFLoadBalancerRuleClassName: 策略方式)
producer-service:
  ribbon:
    # 负载均衡规则类名
    NFLoadBalancerRuleClassName: com.netflix.loadbalancer.RoundRobinRule
    # 连接超时时间
    ConnectTimeout: 100
    # 请求超时时间
    ReadTimeout: 500
    # 无论什么情况失败都进行重试
    OkToRetryOnAllOperations: false
    # 切换服务的重试次数
    MaxAutoRetriesNextServer: 2
    # 对当前服务的重试次数
    maxAutoRetries: 0
