server:
  port: 10002

spring:
  application:
    name: eureka-server

eureka:
  instance:
    appname: ${spring.application.name}
    # eureka集群时, 在节点服务器IP一致的情况下不要使用IP注册(prefer-ip-address: true), 尽量采用修改hosts配置域名的方式, 否则集群无效
    hostname: eureka-node2
    # Eureka界面显示的应用信息
    instance-id: ${eureka.instance.hostname}:${server.port}:[@project.version@]
  client:
    # 是否将自己注册到注册中心
    register-with-eureka: true
    # 是否需要从注册中心获取注册信息
    fetch-registry: true
    service-url:
      # 注册中心的地址
      defaultZone: http://eureka-node1:10001/eureka/
