server:
  port: 10002

spring:
  application:
    name: eureka-server

eureka:
  instance:
    appname: ${spring.application.name}
    hostname: ${spring.cloud.client.ip-address}
    # Eureka界面显示的应用信息
    instance-id: ${spring.cloud.client.ip-address}:${server.port}:[@project.version@]
    # 使用IP地址注册
    prefer-ip-address: true
  client:
    # 是否将自己注册到注册中心
    register-with-eureka: true
    # 是否需要从注册中心获取注册信息
    fetch-registry: true
    service-url:
      # 暴露给客户端注册中心的地址
      defaultZone: http://${eureka.instance.hostname}:10001/eureka/
