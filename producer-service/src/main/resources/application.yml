server:
  port: 10021
  servlet:
    context-path: /producer

spring:
  application:
    name: producer-service

eureka:
  instance:
    # Eureka界面显示的应用名称
    appname: ${spring.application.name}
    # Eureka界面显示的应用信息
    instance-id: ${spring.cloud.client.ip-address}:${server.port}:[@project.version@]
    # 使用IP地址注册
    prefer-ip-address: true
  client:
    service-url:
      # 注册中心的地址
      defaultZone: http://${spring.cloud.client.ip-address}:10001/eureka/,http://${spring.cloud.client.ip-address}:10002/eureka/
